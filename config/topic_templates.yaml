# Pre-curated topic templates for common research areas.
# The LLM selects and adjusts these based on the user's description,
# rather than generating keywords from scratch.

templates:
  - name: axon-myelin-segmentation
    description: "Automated segmentation of axons and myelin in microscopy"
    include_any:
      - axon segmentation
      - myelin segmentation
      - myelinated axon
      - axon and myelin
      - AxonDeepSeg
      - DeepACSON
      - white matter segmentation
      - nerve fiber segmentation
      - myelin sheath
      - histology segmentation
      - electron microscopy segmentation
      - SBEM segmentation
      - instance segmentation white matter
      - multi-domain segmentation microscopy
      - axon morphometry
      - neurite segmentation
      - FIB-SEM
      - SBEM
      - serial block-face
      - volume electron microscopy
      - EM segmentation
      - connectomics
      - axon diameter
      - axon tracing
    include_all: []
    exclude:
      - retina
      - plant
      - cardiac
      - speech
      - satellite
      - remote sensing
      - seismic
      - alloy
      - semiconductor
    boost_authors:
      - Cohen-Adad J
      - Abdollahzadeh A
      - Collin A
      - Zaimi A
    boost_venues:
      - Scientific Reports
      - Communications Biology
      - NeuroImage
      - Nature Methods
      - MICCAI
      - Medical Image Analysis

